version: v2
clean: true
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/csharp:v33.4
    out: src/Peerly.Gateway.ExternalClients/obj/buf.protogen
    opt:
      - file_extension=.g.cs
  - remote: buf.build/grpc/csharp:v1.76.0
    out: src/Peerly.Gateway.ExternalClients/obj/buf.protogen
    opt:
      - no_server
      - file_suffix=Grpc.g.cs
inputs:
  - module: buf.build/peerly/peerly-core
  - module: buf.build/peerly/peerly-auth
