name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: preview-peerly-gateway-pr-${{ github.event.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: peerly-gateway
  CONTAINER_NAME: peerly-gateway-pr-${{ github.event.number }}

jobs:
  build-and-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain

      - run: buf generate
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release

  build-push:
    if: github.event.action != 'closed'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
        run: |
          if [ -z "$REGISTRY" ]; then
            echo "::error::REGISTRY secret is not set"
            exit 1
          fi
          IMAGE="$REGISTRY/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}"
          docker build -t "$IMAGE" .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Push image
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          IMAGE="$REGISTRY/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}"
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$IMAGE"

  # =========================================================================
  # YC-СПЕЦИФИЧНО — preview-деплой в Yandex Cloud Serverless Containers (stage-фолдер).
  # =========================================================================
  deploy-yc-preview:
    if: github.event.action != 'closed'
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n -i /opt/yc
          echo "/opt/yc/bin" >> "$GITHUB_PATH"

      - name: Configure YC CLI
        run: |
          echo '${{ secrets.DEPLOY_SA_KEY_STAGE }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ secrets.DEPLOY_SCOPE_ID_STAGE }}

      - name: Resolve Lockbox current version
        id: lockbox
        run: |
          JSON=$(yc lockbox secret get --id ${{ secrets.SECRETS_STORE_ID_STAGE }} --format json)
          VER=$(echo "$JSON" | jq -r '.current_version.id // .currentVersion.id // empty')
          if [ -z "$VER" ]; then
            echo "::error::Failed to resolve Lockbox current version id"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Resolve image reference
        id: image
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
        run: echo "url=$REGISTRY/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview container
        uses: yc-actions/yc-sls-container-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.DEPLOY_SA_KEY_STAGE }}
          container-name: ${{ env.CONTAINER_NAME }}
          folder-id: ${{ secrets.DEPLOY_SCOPE_ID_STAGE }}
          revision-image-url: ${{ steps.image.outputs.url }}
          revision-service-account-id: ${{ secrets.RUNTIME_SA_ID_STAGE }}
          revision-memory: 256Mb
          revision-env: |
            ASPNETCORE_ENVIRONMENT=Staging
            PeerlyAuthGrpcClientOptions__Target=${{ secrets.AUTH_GRPC_TARGET_STAGE }}
            PeerlyCoreGrpcClientOptions__Target=${{ secrets.CORE_GRPC_TARGET_STAGE }}
            Swagger__Username=${{ secrets.SWAGGER_USERNAME }}
          revision-secrets: |
            Swagger__Password=${{ secrets.SECRETS_STORE_ID_STAGE }}/${{ steps.lockbox.outputs.version }}/swagger_password
            CloudflareAccess__Secret=${{ secrets.SECRETS_STORE_ID_STAGE }}/${{ steps.lockbox.outputs.version }}/cf_secret_stage

      # Gateway — единственный публичный контейнер; stage-gateway всё равно
      # доступен только через Cloudflare Access + CF-Secret middleware.
      - name: Allow unauthenticated invoke (gateway is public by design)
        run: yc serverless container allow-unauthenticated-invoke --name "${{ env.CONTAINER_NAME }}" --folder-id ${{ secrets.DEPLOY_SCOPE_ID_STAGE }}

      - name: Get container URL
        id: get-url
        run: |
          URL=$(yc serverless container get --name "${{ env.CONTAINER_NAME }}" --folder-id ${{ secrets.DEPLOY_SCOPE_ID_STAGE }} --format json | jq -r '.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- peerly-gateway-preview -->';
            const url = '${{ steps.get-url.outputs.url }}';
            const body = `${marker}\n**peerly-gateway preview:** ${url}/swagger`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Cleanup SA key
        if: always()
        run: rm -f /tmp/sa-key.json

  # =========================================================================
  # YC-СПЕЦИФИЧНО — сносим preview-контейнер при закрытии PR.
  # =========================================================================
  cleanup-yc-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n -i /opt/yc
          echo "/opt/yc/bin" >> "$GITHUB_PATH"

      - name: Configure YC CLI
        run: |
          echo '${{ secrets.DEPLOY_SA_KEY_STAGE }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ secrets.DEPLOY_SCOPE_ID_STAGE }}

      - name: Delete preview container
        run: yc serverless container delete --name "${{ env.CONTAINER_NAME }}" --folder-id ${{ secrets.DEPLOY_SCOPE_ID_STAGE }} || true

      - name: Cleanup SA key
        if: always()
        run: rm -f /tmp/sa-key.json
